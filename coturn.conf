# coturn TURN server configuration for Ignition HF WebRTC audio
#
# This file is mounted into the coturn container by docker-compose.yml.
# The static-auth-secret must match webrtc.turn_secret in config/config.jsonc.
# Generate a secret with: openssl rand -hex 32
#
# Firewall rules required (inbound):
#   TCP/UDP 3478  — STUN/TURN control
#   TCP/UDP 5349  — TURNS control (TLS)
#   UDP 49152-49200 — TURN relay media (DTLS-SRTP)

# Listening ports
listening-port=3478
tls-listening-port=5349

# TLS certificate — reuse the cert mounted by nginx
# Adjust filenames to match your certificate files under ./certs/
cert=/etc/coturn/ssl/fullchain.pem
pkey=/etc/coturn/ssl/privkey.pem

# UDP relay port range — must match webrtc.media_port_min/max in config.jsonc
# and the firewall/NAT rules
min-port=49152
max-port=49200

# HMAC time-limited credential mode — compatible with aiortc webrtc_service.py
# generate_turn_credentials(). Set static-auth-secret to webrtc.turn_secret from config.
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SECRET

# Realm — must match the realm used in generate_turn_credentials()
realm=codanhf

# Logging — stdout (captured by docker compose logs coturn)
simple-log
