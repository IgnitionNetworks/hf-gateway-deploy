# Ignition HF Gateway — Production deployment with nginx SSL termination
#
# Quick start:
#   1. Generate a self-signed certificate (for testing / internal use):
#        bash certs/generate-self-signed.sh
#
#      OR obtain a trusted certificate via Let's Encrypt (requires a public domain):
#        bash scripts/letsencrypt-setup.sh your.domain.com admin@example.com
#
#   2. docker compose up -d
#
# If you already have an nginx reverse proxy or SSL offload appliance upstream,
# use docker-compose.template.yml instead — it exposes port 8000 directly
# without the bundled nginx.

services:
  ignition-hf-gateway:
    image: ghcr.io/ignitionnetworks/ignition-hf-gateway:${VERSION:-latest}
    network_mode: host          # required for RTP/UDP and Codan SDK network binding
    cap_add:
      - NET_ADMIN
      - NET_BROADCAST
      - SYS_PTRACE
      - SYS_NICE
    volumes:
      - ./config:/config
      - ./prompts:/prompts
      - ./data:/data
      - ./logs:/logs
    environment:
      - IGNITION_CONFIG=/config/config.jsonc
      - IGNITION_LOG_DIR=/logs
      - IGNITION_UI_DIST=/app/web_ui/dist
      - IGNITION_AUTH_DB=/data/auth.db
      - IGNITION_MSG_DB=/data/messages.db
      - IGNITION_BACKEND_PORT=${IGNITION_BACKEND_PORT:-8765}
      # Auto-update: the app schedules + triggers updates via Watchtower's HTTP API
      # (published on the loopback below). The token gates the API; set it in .env.
      - WATCHTOWER_URL=http://127.0.0.1:8080
      - WATCHTOWER_TOKEN=${WATCHTOWER_TOKEN:-}
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=hfgw"
    restart: unless-stopped

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    network_mode: host          # gateway reaches it at localhost:8880
    environment:
      - DEFAULT_VOICE=am_michael
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./nginx/certbot-webroot:/var/www/certbot:ro   # used during Let's Encrypt renewal
    extra_hosts:
      - "host.docker.internal:host-gateway"           # reaches gateway on host network
    restart: unless-stopped

  # Watchtower runs in HTTP-API mode (no continuous polling). The app owns the
  # schedule via its Auto-Update config (toggle + daily time) and the "Update now"
  # button; both POST /v1/update to this API. Scoped to "hfgw" so it only manages
  # this stack and never races the radiocontrol watchtower on the shared socket.
  watchtower:
    image: containrrr/watchtower:1.7.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8080:8080"   # HTTP API — reachable by the host-network gateway
    environment:
      - REPO_USER=${GHCR_USER:-}
      - REPO_PASS=${GHCR_TOKEN:-}
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_SCOPE=hfgw
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_TOKEN:-}
      - DOCKER_API_VERSION=1.40
    labels:
      - "com.centurylinklabs.watchtower.scope=hfgw"
    restart: unless-stopped
